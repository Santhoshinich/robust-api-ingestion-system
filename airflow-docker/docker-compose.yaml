version: '3'

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-webserver:
    image: apache/airflow:2.9.1
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "darlingdilkyunthoda" 
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs 
      _PIP_ADDITIONAL_REQUIREMENTS: "zeep"
    volumes:
      - ../:/opt/airflow/dags   # mounts your project
      - C:/airflow-logs:/opt/airflow/logs  
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.9.1
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: "darlingdilkyunthoda" 
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      _PIP_ADDITIONAL_REQUIREMENTS: "zeep"
    volumes:
      - ../:/opt/airflow/dags
      - C:/airflow-logs:/opt/airflow/logs   
    command: scheduler

volumes:
  postgres-db-volume: